<!doctype html>
<html>
<head>
  <meta charset="utf-8"><title>Correo enviado</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      background-size: 400px 400px, 300px 300px;
      background-position: 0 0, 100% 100%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(30, 58, 138, 0.25);
      border: 1px solid rgba(96, 165, 250, 0.2);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #ffffff;
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      background: linear-gradient(45deg, #ffffff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #64748b;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .back-link {
      margin-top: 30px;
    }

    .back-link a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      padding: 10px 20px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 8px;
      display: inline-block;
    }

    .back-link a:hover {
      color: #3b82f6;
      background-color: rgba(96, 165, 250, 0.1);
      text-decoration: none;
    }

    /* Estilos responsivos */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        margin: 10px;
      }
      
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Revisa tu correo</h1>
    <p>Si ese email está registrado, te llegó un enlace para restablecer la contraseña.</p>
    <div class="back-link">
      <a href="/">Volver al inicio</a>
    </div>
  </div>
</body>
</html>
