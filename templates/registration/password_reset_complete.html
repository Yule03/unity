<!doctype html>
<html>
<head>
  <meta charset="utf-8"><title>Contraseña restablecida</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      background-size: 400px 400px, 300px 300px;
      background-position: 0 0, 100% 100%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(30, 58, 138, 0.25);
      border: 1px solid rgba(96, 165, 250, 0.2);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #ffffff;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      background: linear-gradient(45deg, #ffffff, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #64748b;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .login-button {
      margin-top: 30px;
    }

    .login-button a {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      display: inline-block;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
    }

    .login-button a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(30, 58, 138, 0.4);
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
      text-decoration: none;
    }

    .login-button a:active {
      transform: translateY(0);
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 20px;
      color: #10b981;
    }

    /* Estilos responsivos */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        margin: 10px;
      }
      
      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✓</div>
    <h1>¡Listo!</h1>
    <p>Tu contraseña fue restablecida. Ya puedes iniciar sesión.</p>
    <div class="login-button">
      <a href="{% url 'appi:login' %}">Iniciar sesión</a>
    </div>
  </div>
</body>
</html>
