services:
  - type: web
    name: unity-web
    env: docker
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: unity-db
          property: connectionString
databases:
  - name: unity-db
    postgresMajorVersion: 15
